# Tagged release: build, sign via Azure Trusted Signing, package the NSIS
# installer, publish a GitHub release. Windows only.
#
# Requires three repository secrets for the signing service principal
# (account specterpoint, profile lockewerks-public):
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
#
# workflow_dispatch runs the whole pipeline and uploads artifacts without
# publishing a release; use it to validate before tagging.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        shell: pwsh
        run: |
          rustup update --no-self-update stable
          rustup default stable
          rustc --version

      - name: Install Trusted Signing client
        shell: pwsh
        run: |
          $dest = Join-Path $env:LOCALAPPDATA 'Microsoft\MicrosoftArtifactSigningClientTools'
          $tmp = Join-Path $env:TEMP 'tsc.nupkg'
          Invoke-WebRequest -Uri 'https://www.nuget.org/api/v2/package/Microsoft.Trusted.Signing.Client' -OutFile $tmp -UseBasicParsing
          New-Item -ItemType Directory -Force $dest | Out-Null
          $extract = Join-Path $env:TEMP 'tsc-extract'
          Expand-Archive $tmp -DestinationPath $extract -Force
          Copy-Item "$extract\bin\x64\*" $dest -Force
          if (-not (Test-Path (Join-Path $dest 'Azure.CodeSigning.Dlib.dll'))) { throw 'dlib missing' }

      - name: UI dependencies
        shell: pwsh
        working-directory: crates/tolaria-desktop/ui
        run: npm ci

      # Sequential: the desktop crate's build script validates that the
      # bundled CLI resource exists, so the CLI must be fully linked first.
      - name: Build binaries
        shell: pwsh
        run: |
          cargo build --release -p tolaria
          if ($LASTEXITCODE -ne 0) { throw "cli build failed" }
          cargo build --release -p tolaria-desktop
          if ($LASTEXITCODE -ne 0) { throw "desktop build failed" }

      # Both exes are signed before bundling so the installer payload is
      # signed even if the bundler's own signCommand pass misses a file;
      # re-signing during bundling is harmless.
      - name: Sign binaries
        shell: pwsh
        run: |
          ./scripts/sign.ps1 target/release/tolaria.exe
          ./scripts/sign.ps1 target/release/tolaria-desktop.exe

      - name: Build desktop app and installer (signs via signCommand)
        shell: pwsh
        working-directory: crates/tolaria-desktop
        run: |
          & "ui\node_modules\.bin\tauri.cmd" build
          if ($LASTEXITCODE -ne 0) { throw "tauri build failed" }

      - name: Collect artifacts and checksums
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\bundle\nsis\*-setup.exe dist\
          Copy-Item target\release\tolaria.exe dist\
          Copy-Item target\release\tolaria-desktop.exe dist\
          Get-ChildItem dist | ForEach-Object {
            "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash, $_.Name
          } | Set-Content dist\SHA256SUMS.txt
          Get-Content dist\SHA256SUMS.txt

      - name: Verify signatures
        shell: pwsh
        run: |
          $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' |
            Sort-Object FullName | Select-Object -Last 1 -ExpandProperty FullName
          foreach ($f in (Get-ChildItem dist\*.exe)) {
            & $signtool verify /pa $f.FullName
            if ($LASTEXITCODE -ne 0) { throw "unsigned artifact: $($f.Name)" }
          }

      - name: Publish release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME (Get-ChildItem dist | ForEach-Object FullName) `
            --title "Tolaria $env:GITHUB_REF_NAME" --generate-notes

      - name: Upload artifacts (dispatch runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: tolaria-windows-x64
          path: dist/*
          if-no-files-found: error
